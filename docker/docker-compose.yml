version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: veilfall-db
    environment:
      POSTGRES_DB: veilfall
      POSTGRES_USER: veilfall
      POSTGRES_PASSWORD: ${DB_PASSWORD:-veilfall_dev_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veilfall"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: veilfall-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
